{% for item in items %}
<a href="{% url 'item_detail' item.id %}" class="bg-white rounded-[18px] shadow-lg overflow-hidden flex flex-col no-underline transition-transform hover:scale-[1.02] group">
    <div class="w-full aspect-square bg-[#DEE7F0] overflow-hidden relative">
        {% if item.image %}
            <img src="{{ item.image.url }}" alt="{{ item.item_name }}" class="w-full h-full object-cover">
        {% endif %}
        <div class="absolute top-3 left-3 px-3 py-1 rounded-full text-[9px] font-black text-white {% if item.report_type == 'LOST' %}bg-lostLight{% else %}bg-brandGreen{% endif %}">
            {{ item.report_type }}
        </div>
    </div>
    <div class="p-5">
        <h3 class="text-[1rem] font-bold text-deepBlue leading-tight">{{ item.item_name }}</h3>
        <p class="text-[0.65rem] text-textMuted font-bold uppercase tracking-wider">{{ item.category }}</p>
        <div class="mt-4 pt-3 border-t border-gray-100 flex items-center gap-2">
            <span class="text-[0.7rem] text-textMuted font-medium">📍 {{ item.location }}</span>
        </div>
    </div>
</a>
{% empty %}
<div class="col-span-full py-20 text-center text-textMuted italic">No items found matching your criteria.</div>
{% endfor %}
